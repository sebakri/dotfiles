[git_status]
style = "bg:sky fg:base"
format = '[$all_status$ahead_behind ]($style)'

[golang]
style = "fg:base bg:sapphire"
version_format = '${major}.${minor}'
format = '[¾░¤ō $version ]($style)'

[character]
